/* ===== css/theme.css ===== */
/* ============================================================================
   theme.css — โทเค็นดีไซน์ + ธีมสีตามส่วน
   ภาพรวม = เขียว-ฟ้าวิทยาศาสตร์ · ชาย = น้ำเงิน/ฟ้าเข้ม · หญิง = ม่วง/พลัม
   ============================================================================ */
:root {
  color-scheme: dark;

  /* ── ฐานสี (พื้นหลังเข้ม โทนวิชาการ) ── */
  --bg-0: #070b16;
  --bg-1: #0b1222;
  --bg-2: #111a2e;
  --surface: rgba(255, 255, 255, 0.045);
  --surface-2: rgba(255, 255, 255, 0.07);
  --stroke: rgba(255, 255, 255, 0.12);
  --stroke-strong: rgba(255, 255, 255, 0.22);

  /* ── ข้อความ ── */
  --ink: #eef4ff;
  --ink-soft: #c2cfe2;
  --ink-dim: #8597b3;

  /* ── สีเน้น (ปรับตามธีมส่วน) ── */
  --accent: #34d3a6;          /* default = overview */
  --accent-2: #4cc3ff;
  --accent-ink: #04150f;
  --glow: rgba(52, 211, 166, 0.45);

  /* ── สีความหมายเชิงเนื้อหา ── */
  --good: #46d6a0;
  --warn: #ffb454;
  --danger: #ff7a8a;
  --info: #5bb3ff;

  /* ── ฮอร์โมน (ใช้ในกราฟ) ── */
  --h-fsh: #4cc3ff;
  --h-lh: #ffd166;
  --h-estro: #b98cff;
  --h-prog: #ff8fb0;
  --h-testo: #4c8dff;

  /* ── ระยะ/รัศมี/เงา ── */
  --r-sm: 10px;
  --r-md: 16px;
  --r-lg: 24px;
  --r-xl: 34px;
  --shadow-1: 0 10px 30px rgba(0, 0, 0, 0.35);
  --shadow-2: 0 24px 70px rgba(0, 0, 0, 0.5);
  --ring: 0 0 0 1px var(--stroke);

  /* ── มาตราตัวอักษร (clamp ให้พอดีจอ TV ระยะไกล) ── */
  --fs-mega: clamp(2.6rem, 7vw, 5.4rem);
  --fs-h1: clamp(2rem, 4.6vw, 3.6rem);
  --fs-h2: clamp(1.5rem, 3vw, 2.4rem);
  --fs-h3: clamp(1.2rem, 2vw, 1.6rem);
  --fs-body: clamp(1.02rem, 1.5vw, 1.32rem);
  --fs-small: clamp(0.86rem, 1.1vw, 1.02rem);

  --maxw: 1180px;
  --ease: cubic-bezier(0.22, 1, 0.36, 1);
  --ease-soft: cubic-bezier(0.4, 0, 0.2, 1);
}

/* ── ธีมต่อส่วน: ตั้งบน <section.slide data-theme="..."> ── */
[data-theme="overview"] {
  --accent: #34d3a6;
  --accent-2: #4cc3ff;
  --accent-ink: #04150f;
  --glow: rgba(52, 211, 166, 0.40);
  --theme-tint: rgba(52, 211, 166, 0.10);
}
[data-theme="male"] {
  --accent: #4c8dff;
  --accent-2: #58c8ff;
  --accent-ink: #021024;
  --glow: rgba(76, 141, 255, 0.42);
  --theme-tint: rgba(76, 141, 255, 0.12);
}
[data-theme="female"] {
  --accent: #b98cff;
  --accent-2: #ff8fc4;
  --accent-ink: #1a0726;
  --glow: rgba(185, 140, 255, 0.42);
  --theme-tint: rgba(185, 140, 255, 0.12);
}
[data-theme="prevent"] {
  --accent: #36c5b0;
  --accent-2: #7ed0ff;
  --accent-ink: #03161a;
  --glow: rgba(54, 197, 176, 0.40);
  --theme-tint: rgba(54, 197, 176, 0.10);
}
[data-theme="summary"] {
  --accent: #7fb3ff;
  --accent-2: #34d3a6;
  --accent-ink: #04132a;
  --glow: rgba(127, 179, 255, 0.40);
  --theme-tint: rgba(127, 179, 255, 0.10);
}


/* ===== css/app.css ===== */
/* ============================================================================
   app.css — โครงสร้าง, ระบบสไลด์ (Scroll/Slide), kinetic animation,
   หน้าต่างควบคุมลอย, hotspot, quiz, speaker notes
   ============================================================================ */
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  font-family: 'Sarabun', 'IBM Plex Sans Thai', 'Noto Sans Thai', system-ui, -apple-system, 'Segoe UI', sans-serif;
  font-size: var(--fs-body);
  line-height: 1.6;
  color: var(--ink);
  background:
    radial-gradient(1200px 800px at 80% -10%, rgba(76, 141, 255, 0.10), transparent 60%),
    radial-gradient(1000px 700px at -10% 110%, rgba(185, 140, 255, 0.10), transparent 55%),
    var(--bg-0);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  overflow-x: hidden;
}
#boot-fallback { z-index: 1; }
#app:not(:empty) ~ #boot-fallback { display: none; }

h1, h2, h3 { line-height: 1.18; margin: 0 0 0.4em; font-weight: 800; letter-spacing: -0.01em; }
p { margin: 0 0 0.7em; }
b, strong { font-weight: 800; }
.en { color: var(--ink-dim); font-weight: 600; font-size: 0.92em; }
.muted { color: var(--ink-dim); }
.nowrap { white-space: nowrap; }

/* ============================ โครงสไลด์ =================================== */
#deck { position: relative; }

.slide {
  position: relative;
  min-height: 100svh;
  width: 100%;
  display: grid;
  grid-template-rows: auto minmax(0, 1fr) auto;
  padding: clamp(2.2rem, 5vh, 4rem) clamp(1.2rem, 5vw, 4rem) clamp(3.4rem, 7vh, 5rem);
  overflow: hidden;
  background:
    radial-gradient(1100px 700px at 100% 0%, var(--theme-tint), transparent 55%),
    linear-gradient(180deg, var(--bg-1), var(--bg-0));
  border-bottom: 1px solid var(--stroke);
}
.slide__inner {
  width: 100%;
  max-width: var(--maxw);
  margin: 0 auto;
  align-self: stretch;
  grid-row: 2;
  display: flex;
  flex-direction: column;
  justify-content: center;
  min-height: 0;
  overflow: hidden;
}
/* ตัวห่อเนื้อหาที่ถูกย่อให้พอดีจอ (fit-to-screen) ในโหมด Slide */
.fit { width: 100%; will-change: transform; }

/* แถบหัว/ท้ายสไลด์ */
.slide__top {
  grid-row: 1;
  display: flex; justify-content: space-between; align-items: flex-start; gap: 1rem;
  max-width: var(--maxw); width: 100%; margin: 0 auto;
}
.kicker {
  display: inline-flex; align-items: center; gap: 0.5ch;
  font-weight: 800; font-size: var(--fs-small); letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--accent);
}
.kicker::before {
  content: ""; width: 1.6rem; height: 2px; border-radius: 2px;
  background: linear-gradient(90deg, var(--accent), transparent);
}
.slide__no {
  font-variant-numeric: tabular-nums; font-weight: 800; color: var(--ink-dim);
  font-size: var(--fs-small);
}

/* ป้ายผู้พูด (badge มุมสไลด์) */
.speaker-badge {
  grid-row: 3; justify-self: start; align-self: end;
  max-width: var(--maxw); width: 100%; margin: 0 auto;
  display: flex; gap: 0.6rem; flex-wrap: wrap;
}
.speaker-chip {
  display: inline-flex; align-items: center; gap: 0.55rem;
  padding: 0.4rem 0.8rem 0.4rem 0.45rem;
  background: var(--surface); border: 1px solid var(--stroke);
  border-radius: 999px; font-size: var(--fs-small); backdrop-filter: blur(6px);
}
.speaker-chip .avatar {
  width: 1.9rem; height: 1.9rem; border-radius: 50%; flex: none;
  display: grid; place-items: center; font-weight: 800; color: var(--accent-ink);
  background: linear-gradient(135deg, var(--accent), var(--accent-2));
}
.speaker-chip .who { font-weight: 800; }
.speaker-chip .role { color: var(--ink-dim); }

/* ============================ องค์ประกอบเนื้อหา ========================== */
.title-xl { font-size: var(--fs-h1); }
.lead { font-size: var(--fs-h3); color: var(--ink-soft); max-width: 62ch; }

.grid { display: grid; gap: clamp(0.8rem, 2vw, 1.3rem); }
.grid.cols-2 { grid-template-columns: repeat(2, 1fr); }
.grid.cols-3 { grid-template-columns: repeat(3, 1fr); }
.grid.cols-4 { grid-template-columns: repeat(4, 1fr); }
.split { display: grid; grid-template-columns: 1.05fr 0.95fr; gap: clamp(1rem, 3vw, 2.4rem); align-items: center; }

.card {
  background: var(--surface); border: 1px solid var(--stroke);
  border-radius: var(--r-md); padding: clamp(1rem, 2vw, 1.5rem);
  box-shadow: var(--shadow-1);
}
.card.tint { background: linear-gradient(180deg, var(--theme-tint), var(--surface)); border-color: var(--stroke-strong); }
.card h3 { font-size: var(--fs-h3); }
.card .ic { font-size: 1.7rem; line-height: 1; }

.pill {
  display: inline-block; padding: 0.22rem 0.7rem; border-radius: 999px;
  font-size: var(--fs-small); font-weight: 800; border: 1px solid var(--stroke-strong);
  background: var(--surface-2);
}
.pill.good { color: var(--good); border-color: color-mix(in srgb, var(--good) 50%, transparent); }
.pill.warn { color: var(--warn); border-color: color-mix(in srgb, var(--warn) 50%, transparent); }
.pill.danger { color: var(--danger); border-color: color-mix(in srgb, var(--danger) 50%, transparent); }
.pill.info { color: var(--info); border-color: color-mix(in srgb, var(--info) 50%, transparent); }

ul.clean, ol.clean { margin: 0.2rem 0; padding-left: 1.3rem; }
ul.clean li, ol.clean li { margin: 0.32rem 0; }
ul.check { list-style: none; padding-left: 0; }
ul.check li { position: relative; padding-left: 1.8rem; margin: 0.4rem 0; }
ul.check li::before {
  content: "✓"; position: absolute; left: 0; top: 0; color: var(--accent);
  font-weight: 800; width: 1.3rem; height: 1.3rem; display: grid; place-items: center;
  background: var(--theme-tint); border-radius: 50%; font-size: 0.85em;
}

/* ป้ายบอกผู้จัดทำสื่อ (subtle) */
.maker {
  display: inline-flex; align-items: center; gap: 0.35rem; margin-top: 0.4rem;
  font-size: 0.74rem; color: var(--accent); opacity: 0.85;
  padding: 0.12rem 0.5rem; border-radius: 999px;
  background: var(--theme-tint); border: 1px solid color-mix(in srgb, var(--accent) 30%, transparent);
}

.stat { display: flex; flex-direction: column; gap: 0.15rem; }
.stat .num { font-size: clamp(2rem, 4vw, 3.2rem); font-weight: 800; color: var(--accent);
  font-variant-numeric: tabular-nums; line-height: 1; }
.stat .lbl { color: var(--ink-dim); font-size: var(--fs-small); }

.note-box {
  border-left: 4px solid var(--accent); background: var(--surface);
  border-radius: 0 var(--r-sm) var(--r-sm) 0; padding: 0.8rem 1rem; font-size: var(--fs-small);
}
.note-box.warn { border-left-color: var(--warn); }
.note-box.danger { border-left-color: var(--danger); }

.kv { display: grid; grid-template-columns: auto 1fr; gap: 0.3rem 0.9rem; align-items: baseline; }
.kv dt { color: var(--accent); font-weight: 800; }
.kv dd { margin: 0; color: var(--ink-soft); }

.compare { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
.compare .col { border-radius: var(--r-md); padding: 1rem 1.1rem; border: 1px solid var(--stroke); }
.compare .col.male { background: linear-gradient(180deg, rgba(76,141,255,.14), var(--surface)); }
.compare .col.female { background: linear-gradient(180deg, rgba(185,140,255,.14), var(--surface)); }
.compare .col h3 { display: flex; align-items: center; gap: 0.5rem; }

/* ป้ายกำกับ disease ฯลฯ */
.tag-row { display: flex; flex-wrap: wrap; gap: 0.4rem; margin: 0.3rem 0 0.6rem; }

/* ============================ ปกหน้า S1 ================================== */
.cover { text-align: center; display: grid; gap: 1.2rem; justify-items: center; }
.cover .eyebrow { letter-spacing: 0.3em; text-transform: uppercase; color: var(--accent); font-weight: 800; }
.cover h1 { font-size: var(--fs-mega); background: linear-gradient(120deg, #fff, var(--accent-2), var(--accent));
  -webkit-background-clip: text; background-clip: text; color: transparent; }
.cover .sub { color: var(--ink-soft); font-size: var(--fs-h3); }
.cover .members {
  display: flex; flex-wrap: wrap; gap: 0.4rem 0.55rem; justify-content: center; max-width: 980px;
}
.cover .members .m {
  font-size: var(--fs-small); padding: 0.28rem 0.65rem; border-radius: 999px;
  background: var(--surface); border: 1px solid var(--stroke); color: var(--ink-soft);
}
.cover .members .m b { color: var(--ink); }

/* ============================ kinetic reveal ============================= */
.reveal { opacity: 0; transform: translateY(22px); }
.reveal.in { opacity: 1; transform: none; transition: opacity 0.6s var(--ease), transform 0.7s var(--ease); }
.reveal.d1 { transition-delay: 0.06s; }
.reveal.d2 { transition-delay: 0.14s; }
.reveal.d3 { transition-delay: 0.22s; }
.reveal.d4 { transition-delay: 0.30s; }
.reveal.d5 { transition-delay: 0.38s; }
.reveal.d6 { transition-delay: 0.46s; }
.reveal.scale { transform: translateY(22px) scale(0.96); }
.reveal.scale.in { transform: none; }
.reveal.left { transform: translateX(-30px); }
.reveal.left.in { transform: none; }
.reveal.right { transform: translateX(30px); }
.reveal.right.in { transform: none; }

@keyframes floaty { 0%,100% { transform: translateY(0);} 50% { transform: translateY(-10px);} }
@keyframes pulseGlow { 0%,100% { filter: drop-shadow(0 0 0 var(--glow)); } 50% { filter: drop-shadow(0 0 14px var(--glow)); } }
@keyframes dashmove { to { stroke-dashoffset: -1000; } }
@keyframes spin { to { transform: rotate(360deg); } }

/* ============================ pseudo-3D ================================== */
.scene3d { perspective: 1200px; }
.tilt { transform-style: preserve-3d; transition: transform 0.3s var(--ease-soft); }
.depth-card {
  background: linear-gradient(180deg, var(--surface-2), var(--surface));
  border: 1px solid var(--stroke-strong); border-radius: var(--r-lg);
  box-shadow: var(--shadow-2), inset 0 1px 0 rgba(255,255,255,.08);
}

/* ============================ ไดอะแกรม SVG + hotspot ===================== */
.diagram { position: relative; width: 100%; }
.diagram svg { width: 100%; height: auto; display: block; overflow: visible; }
.diagram .organ-fill { fill: var(--theme-tint); stroke: var(--accent); stroke-width: 2; }
.diagram .organ-line { fill: none; stroke: var(--accent-2); stroke-width: 2.4; stroke-linecap: round; stroke-linejoin: round; }
.diagram .organ-soft { fill: rgba(255,255,255,.06); stroke: var(--stroke-strong); stroke-width: 1.6; }
.diagram text { fill: var(--ink-soft); font-family: inherit; }

.hotspot { cursor: pointer; }
.hotspot .dot {
  fill: var(--accent); stroke: #fff; stroke-width: 2;
  transition: r 0.2s var(--ease);
}
.hotspot .ring { fill: none; stroke: var(--accent); stroke-width: 2; opacity: 0.55; transform-origin: center; }
.hotspot:hover .dot, .hotspot.active .dot { r: 11; }
.hotspot.active .ring { animation: hsring 1.6s ease-out infinite; }
@keyframes hsring { 0% { r: 9; opacity: .7; } 100% { r: 26; opacity: 0; } }
.hotspot .lead-line { stroke: var(--stroke-strong); stroke-width: 1.5; stroke-dasharray: 3 4; }

.diagram .infocard {
  margin-top: 0.9rem; min-height: 5.5rem;
  background: var(--surface); border: 1px solid var(--stroke); border-radius: var(--r-md);
  padding: 0.9rem 1.1rem; transition: border-color 0.3s;
}
.diagram .infocard.show { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent), var(--shadow-1); }
.diagram .infocard .ttl { font-weight: 800; font-size: var(--fs-h3); color: var(--ink); }
.diagram .infocard .en { display: inline; }
.diagram .infocard .fn { color: var(--ink-soft); margin-top: 0.3rem; }
.diagram .hint { color: var(--ink-dim); font-size: var(--fs-small); }

/* ไดอะแกรมชายภายใน (Wikimedia แปลไทย) */
.dgm9-card {
  background: #f4efe6; border: 1px solid var(--stroke-strong); border-radius: var(--r-lg);
  padding: 0.8rem 1rem; box-shadow: var(--shadow-1);
}
.dgm9-card svg { width: 100%; height: auto; display: block; max-height: 50vh; }
.dgm9-legend-wrap { margin-top: 0.7rem; }
.dgm9-legend-wrap > summary {
  cursor: pointer; font-weight: 800; color: var(--accent); font-size: var(--fs-small);
  list-style: none; display: inline-flex; align-items: center; gap: 0.4rem;
  padding: 0.3rem 0.7rem; border: 1px solid var(--stroke); border-radius: 999px; background: var(--surface);
}
.dgm9-legend-wrap > summary::before { content: "▸"; transition: transform 0.2s; }
.dgm9-legend-wrap[open] > summary::before { transform: rotate(90deg); }
.dgm9-legend {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.15rem 1rem;
  margin-top: 0.6rem; font-size: var(--fs-small);
}
.dgm9-legend b { color: var(--ink); font-weight: 700; }
.dgm9-credit { margin-top: 0.6rem; font-size: 0.78rem; }

.organ-list { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-top: 0.7rem; }
.organ-list button {
  font: inherit; font-size: var(--fs-small); cursor: pointer;
  padding: 0.3rem 0.7rem; border-radius: 999px;
  background: var(--surface); color: var(--ink-soft);
  border: 1px solid var(--stroke); transition: all 0.2s;
}
.organ-list button:hover { border-color: var(--accent); color: var(--ink); }
.organ-list button.active { background: var(--accent); color: var(--accent-ink); border-color: var(--accent); font-weight: 800; }

/* ============================ animation widgets ========================= */
.anim-stage {
  position: relative; background: linear-gradient(180deg, var(--bg-2), var(--bg-1));
  border: 1px solid var(--stroke); border-radius: var(--r-lg); overflow: hidden;
}
.anim-stage svg { width: 100%; height: auto; display: block; }
.anim-controls { display: flex; flex-wrap: wrap; align-items: center; gap: 0.6rem; margin-top: 0.8rem; }
.btn {
  font: inherit; font-weight: 800; cursor: pointer; user-select: none;
  display: inline-flex; align-items: center; gap: 0.5rem;
  padding: 0.55rem 1rem; min-height: 2.7rem;
  border-radius: var(--r-sm); border: 1px solid var(--stroke-strong);
  background: var(--surface-2); color: var(--ink); transition: all 0.18s;
}
.btn:hover { border-color: var(--accent); transform: translateY(-1px); }
.btn.primary { background: linear-gradient(135deg, var(--accent), var(--accent-2)); color: var(--accent-ink); border: none; }
.btn:active { transform: translateY(1px); }
.btn[disabled] { opacity: 0.45; cursor: not-allowed; transform: none; }

.range {
  -webkit-appearance: none; appearance: none; height: 8px; border-radius: 999px;
  background: var(--surface-2); border: 1px solid var(--stroke); outline: none; flex: 1; min-width: 160px;
}
.range::-webkit-slider-thumb {
  -webkit-appearance: none; width: 22px; height: 22px; border-radius: 50%;
  background: var(--accent); border: 3px solid #fff; cursor: pointer; box-shadow: var(--shadow-1);
}
.range::-moz-range-thumb { width: 22px; height: 22px; border-radius: 50%; background: var(--accent); border: 3px solid #fff; cursor: pointer; }

.stage-cap { font-size: var(--fs-small); color: var(--ink-dim); }
.stage-title { font-weight: 800; color: var(--accent); }

/* ป้ายกำกับเฟสในกราฟ/อนิเมชัน */
.phase-tag { font-size: var(--fs-small); font-weight: 800; padding: 0.15rem 0.55rem; border-radius: 999px; }

/* ============================ quiz ====================================== */
/* เรียงคำถามเป็น 2 คอลัมน์ เพื่อให้พอดีจอ (สูงน้อยลง อ่านง่าย) */
.quiz { display: grid; gap: 0.7rem; grid-template-columns: repeat(2, 1fr); align-items: start; }
.quiz__scorewrap { grid-column: 1 / -1; text-align: center; }
.quiz__q {
  background: var(--surface); border: 1px solid var(--stroke); border-radius: var(--r-md);
  padding: clamp(0.7rem, 1.4vw, 1rem);
}
.quiz__q .qhead { display: flex; gap: 0.6rem; align-items: baseline; margin-bottom: 0.6rem; }
.quiz__q .qnum {
  flex: none; width: 1.7rem; height: 1.7rem; border-radius: 50%; display: grid; place-items: center;
  background: var(--theme-tint); color: var(--accent); font-weight: 800; font-size: 0.9em;
}
.quiz__q .qtext { font-size: clamp(0.98rem, 1.4vw, 1.2rem); font-weight: 800; line-height: 1.35; }
.quiz__opts { display: grid; gap: 0.4rem; }
.quiz__opt {
  text-align: left; font: inherit; cursor: pointer;
  display: flex; align-items: center; gap: 0.6rem;
  padding: 0.5rem 0.7rem; min-height: 2.5rem;
  background: var(--surface-2); color: var(--ink);
  border: 1.5px solid var(--stroke); border-radius: var(--r-sm); transition: all 0.18s;
}
.quiz__opt:hover:not(:disabled) { border-color: var(--accent); transform: translateX(3px); }
.quiz__opt .key {
  flex: none; width: 1.7rem; height: 1.7rem; border-radius: 6px; display: grid; place-items: center;
  background: var(--surface); border: 1px solid var(--stroke); font-weight: 800; font-size: 0.9em;
}
.quiz__opt.correct { border-color: var(--good); background: color-mix(in srgb, var(--good) 16%, transparent); }
.quiz__opt.correct .key { background: var(--good); color: #04150f; border-color: var(--good); }
.quiz__opt.wrong { border-color: var(--danger); background: color-mix(in srgb, var(--danger) 16%, transparent); }
.quiz__opt.wrong .key { background: var(--danger); color: #1a0408; border-color: var(--danger); }
.quiz__opt:disabled { cursor: default; }
.quiz__explain {
  margin-top: 0.7rem; font-size: var(--fs-small); color: var(--ink-soft);
  border-left: 3px solid var(--accent); padding: 0.5rem 0.8rem;
  background: var(--surface); border-radius: 0 var(--r-sm) var(--r-sm) 0;
  max-height: 0; overflow: hidden; opacity: 0; transition: all 0.35s var(--ease);
}
.quiz__explain.show { max-height: 220px; opacity: 1; margin-top: 0.7rem; }
.quiz__score {
  display: inline-flex; align-items: center; gap: 0.6rem; font-weight: 800;
  padding: 0.5rem 1rem; border-radius: 999px; background: var(--theme-tint); border: 1px solid var(--accent);
}

/* ============================ progress bar ============================== */
#progress {
  position: fixed; top: 0; left: 0; height: 4px; width: 0;
  background: linear-gradient(90deg, var(--accent), var(--accent-2));
  z-index: 60; transition: width 0.2s var(--ease-soft); box-shadow: 0 0 12px var(--glow);
}

/* ============================ หน้าต่างควบคุมลอย ========================= */
.ctl {
  position: fixed; bottom: 18px; z-index: 80;
  width: min(340px, 46vw); touch-action: none;
  background: rgba(10, 16, 30, 0.82); backdrop-filter: blur(14px);
  border: 1px solid var(--stroke-strong); border-radius: var(--r-lg);
  box-shadow: var(--shadow-2); color: var(--ink);
  user-select: none;
}
.ctl.left { left: 18px; }
.ctl.right { right: 18px; }
.ctl__bar {
  display: flex; align-items: center; gap: 0.5rem; padding: 0.5rem 0.7rem;
  cursor: grab; border-bottom: 1px solid var(--stroke);
}
.ctl__bar:active { cursor: grabbing; }
.ctl__resize {
  position: absolute; right: 4px; bottom: 4px; width: 22px; height: 22px;
  display: grid; place-items: center; cursor: nwse-resize; touch-action: none;
  border: 1px solid var(--stroke); background: var(--surface); color: var(--ink-dim);
  border-radius: 7px; font-size: 0.8rem; line-height: 1; z-index: 2;
}
.ctl__resize:hover { color: var(--accent); border-color: var(--accent); }
.ctl.min .ctl__resize { display: none; }
.ctl__grip { color: var(--ink-dim); font-size: 1rem; letter-spacing: 2px; }
.ctl__name { font-weight: 800; font-size: var(--fs-small); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ctl__min {
  font: inherit; cursor: pointer; border: 1px solid var(--stroke); background: var(--surface);
  color: var(--ink); width: 1.9rem; height: 1.9rem; border-radius: 7px; line-height: 1;
}
.ctl__body { padding: 0.7rem; display: grid; gap: 0.6rem; }
.ctl.min .ctl__body { display: none; }
.ctl.min { width: auto; }
.ctl.min .ctl__name { max-width: 9rem; }

.ctl__btn {

  border-radius: var(--r-sm); border: 1px solid var(--stroke-strong);
  background: var(--surface-2); color: var(--ink); font-size: 1.2rem; transition: all 0.15s;
}
.ctl__btn:hover { border-color: var(--accent); background: var(--theme-tint); }

}
.ctl__counter small { font-weight: 600; color: var(--ink-dim); font-size: 0.7rem; letter-spacing: 0.05em; }
.ctl__counter .cur { color: var(--accent); }

.ctl__seek { -webkit-appearance: none; appearance: none; width: 100%; height: 10px; border-radius: 999px;
  background: var(--surface-2); border: 1px solid var(--stroke); outline: none; }
.ctl__seek::-webkit-slider-thumb { -webkit-appearance: none; width: 24px; height: 24px; border-radius: 50%;
  background: var(--accent); border: 3px solid #fff; cursor: pointer; }
.ctl__seek::-moz-range-thumb { width: 24px; height: 24px; border-radius: 50%; background: var(--accent); border: 3px solid #fff; }

.ctl__tools { display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.4rem; }
.ctl__tool {
  font: inherit; font-size: var(--fs-small); font-weight: 700; cursor: pointer;
  display: flex; align-items: center; gap: 0.45rem; justify-content: center;

.ctl__tool.on { background: var(--theme-tint); color: var(--accent); border-color: var(--accent); }
.ctl__tool .ic { font-size: 1.05rem; }

/* ============================ speaker notes ============================= */
#notes {
  position: fixed; left: 50%; bottom: 0; transform: translate(-50%, 110%);
  width: min(900px, 94vw); max-height: 42vh; z-index: 70;
  background: rgba(8, 13, 24, 0.96); backdrop-filter: blur(16px);
  border: 1px solid var(--stroke-strong); border-bottom: none;
  border-radius: var(--r-lg) var(--r-lg) 0 0; box-shadow: var(--shadow-2);
  transition: transform 0.4s var(--ease); overflow: hidden;
  display: grid; grid-template-rows: auto 1fr;
}
#notes.show { transform: translate(-50%, 0); }

  border-bottom: 1px solid var(--stroke); background: var(--surface);
}

#notes .nhead .who { color: var(--ink-dim); font-size: var(--fs-small); margin-left: auto; }

  color: var(--ink); width: 2rem; height: 2rem; border-radius: 7px;
}

/* ป้ายโหมด/ความช่วยเหลือ */
#toast {
  position: fixed; top: 16px; left: 50%; transform: translateX(-50%) translateY(-20px);
  z-index: 90; background: rgba(8,13,24,.95); border: 1px solid var(--accent);
  color: var(--ink); padding: 0.5rem 1rem; border-radius: 999px; font-weight: 700; font-size: var(--fs-small);
  opacity: 0; pointer-events: none; transition: all 0.3s var(--ease); box-shadow: var(--shadow-1);
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ============================ โหมด Slide ================================= */
body.mode-slide { overflow: hidden; height: 100svh; }
body.mode-slide #deck { height: 100svh; }
body.mode-slide .slide { display: none; min-height: 100svh; height: 100svh; }
body.mode-slide .slide.current { display: grid; }
body.mode-slide .slide.current { animation: slideIn 0.55s var(--ease) both; }
@keyframes slideIn {
  from { opacity: 0; transform: translateX(40px) scale(0.985); }
  to { opacity: 1; transform: none; }
}
body.mode-slide .slide.current.back { animation: slideInBack 0.55s var(--ease) both; }
@keyframes slideInBack {
  from { opacity: 0; transform: translateX(-40px) scale(0.985); }
  to { opacity: 1; transform: none; }
}

/* โหมด Scroll: ใช้ scroll snap เบา ๆ */
body.mode-scroll { scroll-snap-type: y proximity; }
body.mode-scroll .slide { scroll-snap-align: start; }

/* overview grid (ตาราง thumbnail สไลด์) */
#overview {

}
#overview.show { display: block; }
#overview h2 { text-align: center; margin-bottom: 1.2rem; }

.ov-cell {

.ov-cell:hover { border-color: var(--accent); transform: translateY(-3px); background: var(--theme-tint); }

.ov-cell .ov-sp { color: var(--ink-dim); font-size: 0.78rem; }

/* ============================ reduce motion ============================= */
body.reduce-motion *, body.reduce-motion *::before, body.reduce-motion *::after {
  animation-duration: 0.001s !important; animation-iteration-count: 1 !important;
  transition-duration: 0.001s !important; scroll-behavior: auto !important;
}
body.reduce-motion .reveal { opacity: 1 !important; transform: none !important; }
@media (prefers-reduced-motion: reduce) {
  .reveal { opacity: 1; transform: none; }
}

/* ============================ responsive =============================== */
@media (max-width: 860px) {
  .split, .compare, .grid.cols-2, .grid.cols-3, .grid.cols-4, .quiz { grid-template-columns: 1fr; }

  .dgm9-card svg { max-height: none; }

/* พิมพ์ (สำรอง) */
@media print {
  .ctl, #notes, #progress, #toast, #overview { display: none !important; }
  .slide { page-break-after: always; min-height: auto; }
  body { background: #fff; color: #000; }
}

/* ============================================================================
   diagrams.js — ไดอะแกรมกายวิภาค SVG แบบ interactive (hotspot)
   ไดอะแกรมเชิงวิทยาศาสตร์/แผนผัง (schematic) — ไม่ใช่ภาพสมจริง
   ============================================================================ */
'use strict';

(function () {

  // โรงงานสร้างไดอะแกรม: art = SVG ส่วนกายวิภาค, organs = จุด hotspot
  function makeDiagram(host, cfg) {
    const organs = cfg.organs;
    const hs = organs.map((o, i) => `
      <g class="hotspot" data-id="${o.id}" tabindex="0" role="button" aria-label="${o.name}">
        <circle class="ring" cx="${o.x}" cy="${o.y}" r="9"></circle>
        <circle class="dot" cx="${o.x}" cy="${o.y}" r="7"></circle>
        <text x="${o.x + (o.lx != null ? o.lx : 13)}" y="${o.y + (o.ly != null ? o.ly : 5)}"
          font-size="17" font-weight="800" fill="#fff" paint-order="stroke"
          stroke="rgba(0,0,0,.6)" stroke-width="3">${i + 1}</text>
      </g>`).join('');

    host.innerHTML = `
      <div class="split" style="align-items:start">
        <div class="diagram">
          <svg viewBox="${cfg.viewBox}" role="img" aria-label="${cfg.aria || 'ไดอะแกรมกายวิภาค'}">
            ${cfg.art}
            <g class="hotspots">${hs}</g>
          </svg>
        </div>
        <div>
          <div class="infocard">
            <div class="default"><div class="hint">👆 แตะจุดหมายเลขบนภาพ หรือเลือกจากรายการด้านล่าง เพื่อดูชื่อและหน้าที่</div></div>
            <div class="detail" style="display:none">
              <div class="ttl"></div>
              <div class="fn"></div>
            </div>
          </div>
          <div class="organ-list">
            ${organs.map((o, i) => `<button data-id="${o.id}">${i + 1}. ${o.name}</button>`).join('')}
          </div>
          ${cfg.caption ? `<div class="hint" style="margin-top:.6rem">${cfg.caption}</div>` : ''}
        </div>
      </div>`;

    const svg = host.querySelector('svg');
    const infocard = host.querySelector('.infocard');
    const detail = host.querySelector('.detail');
    const def = host.querySelector('.default');

    function select(id) {
      const o = organs.find(x => x.id === id);
      if (!o) return;
      def.style.display = 'none';
      detail.style.display = '';
      infocard.classList.add('show');
      detail.querySelector('.ttl').innerHTML = `${o.name} <span class="en">(${o.en})</span>`;
      detail.querySelector('.fn').textContent = o.fn;
      host.querySelectorAll('.hotspot').forEach(h => h.classList.toggle('active', h.dataset.id === id));
      host.querySelectorAll('.organ-list button').forEach(b => b.classList.toggle('active', b.dataset.id === id));
    }

    svg.querySelectorAll('.hotspot').forEach(h => {
      h.addEventListener('click', () => select(h.dataset.id));
      h.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); select(h.dataset.id); } });
    });
    host.querySelectorAll('.organ-list button').forEach(b => {
      b.addEventListener('click', () => select(b.dataset.id));
    });
  }

/* ============================================================================
   animations.js — widget แอนิเมชันกระบวนการ + กราฟ + quiz
     · chart-testosterone   ฮอร์โมนเพศชายตามอายุ
     · anim-spermatogenesis การสร้างอสุจิ (stepper)
     · anim-fertilization   การเดินทางอสุจิ → ปฏิสนธิ
     · anim-menstrual       รอบประจำเดือน (interactive)
     · anim-oogenesis       การสร้างไข่ + การตกไข่ (stepper)
     · quiz                 แบบทดสอบเลือกตอบ เฉลยทันที
   ============================================================================ */
'use strict';

(function () {
  function motionOn() { return !window.Engine || (Engine.state && Engine.state.motion !== false); }
  const lerp = (a, b, t) => a + (b - a) * t;

  // เส้นโค้งจากชุดค่า (0..1) → polyline points ในกรอบ plot
  function curvePoints(vals, x0, x1, yBase, yTop) {
    const n = vals.length;
    return vals.map((v, i) => {
      const x = lerp(x0, x1, i / (n - 1));
      const y = lerp(yBase, yTop, v);
      return [x, y];
    });
  }
  function toPath(pts) { return pts.map((p, i) => (i ? 'L' : 'M') + p[0].toFixed(1) + ' ' + p[1].toFixed(1)).join(' '); }

  // ── อสุจิ (รูปสัญลักษณ์) ───────────────────────────────────────────────
  function spermSVG(x, y, s, color, id) {
    color = color || 'var(--accent-2)';
    return `<g transform="translate(${x},${y}) scale(${s})" ${id ? `data-sp="${id}"` : ''}>
      <ellipse cx="0" cy="0" rx="9" ry="7" fill="${color}"/>
      <path d="M8 0 q14 -8 24 0 q-14 8 -24 0" fill="none" stroke="${color}" stroke-width="2.4"/>
    </g>`;
  }
  function cellSVG(x, y, r, label, fill, stroke) {
    fill = fill || 'var(--theme-tint)'; stroke = stroke || 'var(--accent)';
    return `<g><circle cx="${x}" cy="${y}" r="${r}" fill="${fill}" stroke="${stroke}" stroke-width="2.4"/>
      <circle cx="${x}" cy="${y}" r="${r * 0.42}" fill="${stroke}" opacity=".35"/>
      <text x="${x}" y="${y + 5}" text-anchor="middle" font-size="${Math.max(12, r * 0.5)}" font-weight="800" fill="#fff">${label}</text></g>`;
  }

  /* =========================================================================
     1) chart-testosterone
     ========================================================================= */
  window.WIDGETS['chart-testosterone'] = function (host) {
    // ระดับเทสโทสเตอโรนสัมพัทธ์ตามอายุ 0..60 ปี
    function level(age) {
      if (age < 10) return 0.08 + age * 0.005;
      if (age < 18) return 0.13 + (age - 10) * 0.108;      // วัยรุ่นพุ่งสูง
      if (age < 40) return 0.98 - (age - 18) * 0.002;
      return Math.max(0.55, 0.94 - (age - 40) * 0.018);    // ค่อย ๆ ลด
    }
    const X0 = 70, X1 = 540, YB = 250, YT = 40;
    const vals = []; for (let a = 0; a <= 60; a++) vals.push(level(a));
    const pts = vals.map((v, a) => [lerp(X0, X1, a / 60), lerp(YB, YT, v)]);
    const path = toPath(pts);
    const area = path + ` L ${X1} ${YB} L ${X0} ${YB} Z`;

    host.innerHTML = `
      <div class="anim-stage" style="padding:1rem">
        <svg viewBox="0 0 580 300" aria-label="กราฟระดับเทสโทสเตอโรนตามอายุ">
          <defs><linearGradient id="tg" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="var(--h-testo)" stop-opacity=".45"/>
            <stop offset="1" stop-color="var(--h-testo)" stop-opacity="0"/></linearGradient></defs>
          <line x1="${X0}" y1="${YB}" x2="${X1}" y2="${YB}" stroke="var(--stroke-strong)"/>
          <line x1="${X0}" y1="${YT}" x2="${X0}" y2="${YB}" stroke="var(--stroke-strong)"/>
          <text x="${X0 - 8}" y="${YT + 6}" text-anchor="end" font-size="12" fill="var(--ink-dim)">สูง</text>
          <text x="${X0 - 8}" y="${YB}" text-anchor="end" font-size="12" fill="var(--ink-dim)">ต่ำ</text>
          <path d="${area}" fill="url(#tg)"/>
          <path class="tline" d="${path}" fill="none" stroke="var(--h-testo)" stroke-width="3.5"
            stroke-linecap="round" stroke-linejoin="round"/>
          <g class="tmark"><line x1="0" y1="${YT}" x2="0" y2="${YB}" stroke="#fff" stroke-dasharray="3 4" opacity=".6"/>
            <circle r="7" fill="#fff" stroke="var(--h-testo)" stroke-width="3"/></g>
          <text x="${X0}" y="278" font-size="12" fill="var(--ink-dim)">0</text>
          <text x="${lerp(X0, X1, 13 / 60)}" y="278" font-size="12" fill="var(--ink-dim)" text-anchor="middle">วัยรุ่น</text>
          <text x="${X1}" y="278" font-size="12" fill="var(--ink-dim)" text-anchor="end">60 ปี</text>
        </svg>
        <div style="display:flex;justify-content:space-between;align-items:center;gap:1rem;margin-top:.4rem">
          <div><span class="stage-title">อายุ <span class="age">14</span> ปี</span>
            <span class="muted lifestage"></span></div>
          <div><b class="lvl" style="color:var(--h-testo)"></b></div>
        </div>
        <input class="range agerange" type="range" min="0" max="60" value="14" step="1" aria-label="เลือกอายุ">
      </div>`;

    const mark = host.querySelector('.tmark');
    const tline = host.querySelector('.tline');
    const update = (age) => {
      const x = lerp(X0, X1, age / 60), y = lerp(YB, YT, level(age));
      mark.setAttribute('transform', `translate(${x},0)`);
      mark.querySelector('circle').setAttribute('cy', y);
      host.querySelector('.age').textContent = age;
      const pct = Math.round(level(age) * 100);
      host.querySelector('.lvl').textContent = 'ระดับ ~' + pct + '%';
      const st = age < 11 ? 'วัยเด็ก — ระดับต่ำ' : age < 18 ? 'วัยรุ่น — เพิ่มขึ้นรวดเร็ว' :
        age < 40 ? 'วัยผู้ใหญ่ — คงระดับสูง' : 'วัยกลางคน — ค่อย ๆ ลดลง';
      host.querySelector('.lifestage').textContent = ' · ' + st;
    };
    host.querySelector('.agerange').addEventListener('input', e => update(+e.target.value));
    update(14);

    if (motionOn()) {
      const len = tline.getTotalLength();
      tline.style.strokeDasharray = len; tline.style.strokeDashoffset = len;
      requestAnimationFrame(() => {
        tline.style.transition = 'stroke-dashoffset 1.6s var(--ease)';
        tline.style.strokeDashoffset = 0;
      });
    }
  };

  /* =========================================================================
     stepper ทั่วไป (ใช้กับ spermatogenesis / oogenesis)
     ========================================================================= */
  function makeStepper(host, cfg) {
    const steps = cfg.steps;
    let idx = 0, timer = null;

    host.innerHTML = `
      <div class="anim-stage" style="padding:1rem 1rem 1.2rem">
        <svg class="stg" viewBox="0 0 760 300" aria-label="${cfg.aria || ''}"></svg>
      </div>
      <div style="margin-top:.7rem">
        <div class="stage-title sub"></div>
        <div class="muted en2" style="font-size:var(--fs-small)"></div>
        <div class="desc" style="margin-top:.3rem"></div>
      </div>
      <div class="anim-controls">
        <button class="btn prev">‹ ก่อนหน้า</button>
        <button class="btn primary play">▶ เล่นทีละขั้น</button>
        <button class="btn next">ถัดไป ›</button>
        <span class="stage-cap dots"></span>
      </div>`;

    const stg = host.querySelector('.stg');
    function render() {
      const s = steps[idx];
      stg.innerHTML = (motionOn() ? '' : '') + s.svg;
      host.querySelector('.sub').innerHTML = `ขั้นที่ ${idx + 1}: ${s.t}`;
      host.querySelector('.en2').textContent = s.sub || '';
      host.querySelector('.desc').textContent = s.desc || '';
      host.querySelector('.dots').innerHTML = steps.map((_, i) =>
        `<span style="display:inline-block;width:10px;height:10px;border-radius:50%;margin:0 3px;background:${i === idx ? 'var(--accent)' : 'var(--stroke-strong)'}"></span>`).join('');
      host.querySelector('.prev').disabled = idx === 0;
      host.querySelector('.next').disabled = idx === steps.length - 1;
      if (motionOn()) { stg.style.opacity = 0; requestAnimationFrame(() => { stg.style.transition = 'opacity .4s'; stg.style.opacity = 1; }); }
      if (window.Engine && Engine.refit) Engine.refit();
    }
    function go(i) { idx = Math.max(0, Math.min(steps.length - 1, i)); render(); }
    function stopPlay() { if (timer) { clearInterval(timer); timer = null; host.querySelector('.play').innerHTML = '▶ เล่นทีละขั้น'; } }
    function play() {
      if (timer) { stopPlay(); return; }
      if (idx === steps.length - 1) go(0);
      host.querySelector('.play').innerHTML = '⏸ หยุด';
      timer = setInterval(() => { if (idx >= steps.length - 1) { stopPlay(); } else go(idx + 1); }, motionOn() ? 1700 : 700);
    }
    host.querySelector('.prev').addEventListener('click', () => { stopPlay(); go(idx - 1); });
    host.querySelector('.next').addEventListener('click', () => { stopPlay(); go(idx + 1); });
    host.querySelector('.play').addEventListener('click', play);
    render();
  }

/* ===== js/engine.js ===== */
/* ============================================================================
   engine.js — kinetic engine
   - เรนเดอร์เด็คจาก DATA.slides
   - โหมด Scroll / Slide สลับกันได้
   - หน้าต่างควบคุมลอย 2 อัน ลากย้าย/ย่อได้ (Pointer Events) สำหรับผู้พูดหลายคน
   - progress bar, ปุ่ม Motion, speaker notes (คีย์ N), overview (คีย์ O)
   - widget registry: window.WIDGETS[name] = (rootEl) => void
   ============================================================================ */
'use strict';

window.WIDGETS = window.WIDGETS || {};

const Engine = (function () {
  const LS = 'rsm6.prefs.v1';
  const state = {
    mode: 'slide',        // 'slide' | 'scroll'
    current: 0,
    motion: true,         // true = เปิด animation
    notesOpen: false,
    overviewOpen: false,
    total: 0,
  };

  let deckEl, slidesEls = [], io = null, lastDir = 1;
  const initialized = new WeakSet();

  // ── utils ──────────────────────────────────────────────────────────────
  const $ = (sel, root = document) => root.querySelector(sel);
  const el = (tag, cls, html) => {
    const n = document.createElement(tag);
    if (cls) n.className = cls;
    if (html != null) n.innerHTML = html;
    return n;
  };
  function loadPrefs() {
    try { return JSON.parse(localStorage.getItem(LS)) || {}; } catch (e) { return {}; }
  }
  function savePrefs() {
    try {
      localStorage.setItem(LS, JSON.stringify({ mode: state.mode, motion: state.motion }));
    } catch (e) { /* file:// อาจปิด localStorage — ไม่เป็นไร */ }
  }

  // ── build deck ───────────────────────────────────────────────────────────
  function buildSpeakerBadge(speakers) {
    if (!speakers || !speakers.length) return '';
    const chips = speakers.map(s => {
      const initial = (s.name || '?').trim().charAt(0);
      const meta = `<span><span class="who">${s.name}</span>` +
        (s.no ? ` <span class="muted">#${s.no}</span>` : '') +
        (s.role ? `<br><span class="role">${s.role}</span>` : '') + `</span>`;
      return `<span class="speaker-chip"><span class="avatar">${initial}</span>${meta}</span>`;
    }).join('');
    return `<div class="speaker-badge">${chips}</div>`;
  }

  function render() {
    const app = $('#app');
    app.innerHTML = '';

    app.appendChild(el('div', null, '<div id="progress"></div>').firstChild);

    deckEl = el('main', null);
    deckEl.id = 'deck';

    DATA.slides.forEach((s, i) => {
      const sec = el('section', 'slide');
      sec.id = 'slide-' + (i + 1);
      sec.dataset.index = i;
      sec.setAttribute('data-theme', s.theme || 'overview');
      sec.setAttribute('aria-label', `สไลด์ ${i + 1}: ${s.kicker || ''}`);

      const top = `<div class="slide__top">
          <span class="kicker">${s.kicker || ''}</span>
          <span class="slide__no">${String(i + 1).padStart(2, '0')} / ${DATA.slides.length}</span>
        </div>`;
      const inner = `<div class="slide__inner"><div class="fit">${s.html || ''}</div></div>`;
      const badge = buildSpeakerBadge(s.speakers);

      sec.innerHTML = top + inner + badge;
      deckEl.appendChild(sec);
    });

    app.appendChild(deckEl);
    slidesEls = Array.from(deckEl.querySelectorAll('.slide'));
    state.total = slidesEls.length;

    buildControls();
    buildNotes();
    buildOverview();
    buildToast();
  }

  // ── widgets ────────────────────────────────────────────────────────────
  function initWidgets(scope) {
    scope.querySelectorAll('[data-widget]').forEach(node => {
      if (initialized.has(node)) return;
      const name = node.getAttribute('data-widget');
      const fn = window.WIDGETS[name];
      if (typeof fn === 'function') {
        try { fn(node); } catch (e) { console.error('widget error:', name, e); }
        initialized.add(node);
      }
    });
  }

  // ── reveal ───────────────────────────────────────────────────────────────
  function revealAll(slide) {
    slide.querySelectorAll('.reveal').forEach(r => r.classList.add('in'));
  }
  function resetReveal(slide) {
    if (!state.motion) return;
    slide.querySelectorAll('.reveal').forEach(r => r.classList.remove('in'));
  }

  // ── fit-to-screen: ย่อเนื้อหาสไลด์ให้พอดีจอ (เฉพาะโหมด Slide) ──────────────
  function fitSlide(slide) {
    if (!slide) return;
    const fit = slide.querySelector('.fit');
    const inner = slide.querySelector('.slide__inner');
    if (!fit || !inner) return;
    if (state.mode !== 'slide') { fit.style.transform = ''; inner.style.justifyContent = 'center'; return; }

    fit.style.transform = 'none';
    inner.style.justifyContent = 'center';

    const avail = inner.clientHeight;       // ความสูงที่ใช้ได้จริง (ถูก cap โดย track)
    const need = fit.scrollHeight;          // ความสูงเนื้อหาจริง

    fit.style.transformOrigin = 'top center';
    if (need > avail + 2 && avail > 0) {
      const s = Math.max(0.3, avail / need);
      inner.style.justifyContent = 'flex-start'; // ชิดบน เพื่อไม่ให้หัวเรื่องโดนตัด
      fit.style.transform = `scale(${s.toFixed(4)})`;
    } else {
      fit.style.transform = 'none';
    }
  }
  function refit() {
    const cur = slidesEls[state.current];
    if (cur) fitSlide(cur);
  }

  // ── current slide tracking ───────────────────────────────────────────────
  function setCurrent(i, opts = {}) {
    i = Math.max(0, Math.min(state.total - 1, i));
    lastDir = i >= state.current ? 1 : -1;
    state.current = i;

    if (state.mode === 'slide') {
      slidesEls.forEach((s, idx) => {
        s.classList.toggle('current', idx === i);
        s.classList.toggle('back', lastDir < 0);
      });
      const cur = slidesEls[i];
      if (state.motion) { resetReveal(cur); requestAnimationFrame(() => revealAll(cur)); }
      else revealAll(cur);
      initWidgets(cur);
      requestAnimationFrame(() => fitSlide(cur));
      setTimeout(() => fitSlide(cur), 260);
    } else if (opts.scroll) {
      slidesEls[i].scrollIntoView({ behavior: state.motion ? 'smooth' : 'auto', block: 'start' });
    }
    updateUI();
  }

  function updateUI() {
    const i = state.current, n = state.total;
    const pct = n > 1 ? (i / (n - 1)) * 100 : 100;
    const pb = $('#progress'); if (pb) pb.style.width = pct + '%';

    document.querySelectorAll('.ctl').forEach(p => {
      p.querySelector('.cur').textContent = i + 1;
      p.querySelector('.tot').textContent = n;
      const seek = p.querySelector('.ctl__seek');
      seek.max = n; seek.value = i + 1;
      // ธีมของหน้าต่างควบคุมให้ตามสไลด์ปัจจุบัน
      p.setAttribute('data-theme', DATA.slides[i].theme || 'overview');
    });
    // notes
    if (state.notesOpen) fillNotes();
    // theme bg accent on body for ctl outside slide
    document.body.setAttribute('data-theme', DATA.slides[i].theme || 'overview');
  }

  function next() { setCurrent(state.current + 1, { scroll: true }); }
  function prev() { setCurrent(state.current - 1, { scroll: true }); }
  function goto(i) { setCurrent(i, { scroll: true }); }

  // ── modes ────────────────────────────────────────────────────────────────
  function applyMode() {
    document.body.classList.toggle('mode-slide', state.mode === 'slide');
    document.body.classList.toggle('mode-scroll', state.mode === 'scroll');
    if (state.mode === 'scroll') {
      if (io) io.disconnect();
      io = new IntersectionObserver(entries => {
        entries.forEach(e => {
          if (e.isIntersecting) {
            const idx = +e.target.dataset.index;
            if (state.motion) revealAll(e.target);
            else revealAll(e.target);
            initWidgets(e.target);
            // อัปเดต current จากตำแหน่งกึ่งกลาง
            if (e.intersectionRatio > 0.5) { state.current = idx; updateUI(); }
          }
        });
      }, { threshold: [0.12, 0.5, 0.85] });
      slidesEls.forEach(s => io.observe(s));
      // ในโหมด scroll เผยทุกอันที่เห็นแล้ว
      slidesEls.forEach(s => initWidgets(s));
      setCurrent(state.current, { scroll: true });
    } else {
      if (io) { io.disconnect(); io = null; }
      // โหมด scroll: ล้าง transform fit ออก
      slidesEls.forEach(s => { const f = s.querySelector('.fit'); if (f) f.style.transform = ''; });
      slidesEls.forEach(s => s.classList.remove('current', 'back'));
      setCurrent(state.current);
    }
  }
  function toggleMode() {
    state.mode = state.mode === 'slide' ? 'scroll' : 'slide';
    applyMode(); savePrefs();
    toast(state.mode === 'slide' ? 'โหมดสไลด์ (Slide)' : 'โหมดเลื่อน (Scroll)');
    syncToolButtons();
  }

  // ── motion ─────────────────────────────────────────────────────────────
  function toggleMotion() {
    state.motion = !state.motion;
    document.body.classList.toggle('reduce-motion', !state.motion);
    savePrefs();
    toast(state.motion ? 'เปิดแอนิเมชัน' : 'ลดแอนิเมชัน (Reduce motion)');
    syncToolButtons();
    if (!state.motion) slidesEls.forEach(revealAll);
  }

  // ── fullscreen ───────────────────────────────────────────────────────────
  function toggleFullscreen() {
    const d = document;
    if (!d.fullscreenElement) (d.documentElement.requestFullscreen || function(){})();
    else (d.exitFullscreen || function(){}).call(d);
  }

  // ── controls (หน้าต่างลอย 2 อัน) ─────────────────────────────────────────
  function controlMarkup(side, label) {
    return `
      <div class="ctl ${side}" data-theme="overview">
        <div class="ctl__bar" data-drag>
          <span class="ctl__grip">⠿</span>
          <span class="ctl__name">${label}</span>
          <button class="ctl__min" title="ย่อ/ขยาย" aria-label="ย่อหรือขยาย">–</button>
        </div>
        <button class="ctl__resize" title="ลากเพื่อปรับขนาด" aria-label="ปรับขนาดหน้าต่าง">⤡</button>
        <div class="ctl__body">
          <div class="ctl__nav">
            <button class="ctl__btn" data-prev title="ก่อนหน้า (←)" aria-label="สไลด์ก่อนหน้า">‹</button>
            <div class="ctl__counter"><small>สไลด์</small><span><span class="cur">1</span> / <span class="tot">30</span></span></div>
            <button class="ctl__btn big" data-next title="ถัดไป (→)" aria-label="สไลด์ถัดไป">›</button>
          </div>
          <input class="ctl__seek" type="range" min="1" max="30" value="1" step="1" aria-label="เลื่อนไปสไลด์">
          <div class="ctl__tools">
            <button class="ctl__tool" data-tool="mode"><span class="ic">🖥️</span><span class="lbl">โหมด</span></button>
            <button class="ctl__tool" data-tool="notes"><span class="ic">📝</span><span class="lbl">โน้ตผู้พูด</span></button>
            <button class="ctl__tool" data-tool="overview"><span class="ic">▦</span><span class="lbl">ภาพรวม</span></button>
            <button class="ctl__tool" data-tool="motion"><span class="ic">🎬</span><span class="lbl">แอนิเมชัน</span></button>
            <button class="ctl__tool" data-tool="full"><span class="ic">⛶</span><span class="lbl">เต็มจอ</span></button>
            <button class="ctl__tool" data-tool="help"><span class="ic">⌨️</span><span class="lbl">คีย์ลัด</span></button>
          </div>
        </div>
      </div>`;
  }

  function buildControls() {
    const wrap = el('div');
    wrap.innerHTML = controlMarkup('left', 'ผู้ควบคุม • ซ้าย') + controlMarkup('right', 'ผู้ควบคุม • ขวา');
    Array.from(wrap.children).forEach(c => document.body.appendChild(c));

    document.querySelectorAll('.ctl').forEach(panel => {
      panel.querySelector('[data-prev]').addEventListener('click', prev);
      panel.querySelector('[data-next]').addEventListener('click', next);
      panel.querySelector('.ctl__min').addEventListener('click', () => panel.classList.toggle('min'));
      const seek = panel.querySelector('.ctl__seek');
      seek.addEventListener('input', () => goto(+seek.value - 1));
      panel.querySelectorAll('.ctl__tool').forEach(btn => {
        btn.addEventListener('click', () => handleTool(btn.dataset.tool));
      });
      makeDraggable(panel, panel.querySelector('[data-drag]'));
      makeResizable(panel, panel.querySelector('.ctl__resize'));
    });
    syncToolButtons();
  }

  // ── resizable (ปรับขนาดหน้าต่างควบคุม ด้วย zoom) ──────────────────────────
  function makeResizable(panel, handle) {
    let sx = 0, sy = 0, base = 1, active = false;
    handle.addEventListener('pointerdown', e => {
      e.stopPropagation();
      active = true;
      handle.setPointerCapture(e.pointerId);
      sx = e.clientX; sy = e.clientY;
      base = parseFloat(panel.style.zoom || '1') || 1;
      panel.style.transition = 'none';
    });
    handle.addEventListener('pointermove', e => {
      if (!active) return;
      const d = ((e.clientX - sx) + (e.clientY - sy)) / 240;
      const z = Math.max(0.7, Math.min(2.3, base + d));
      panel.style.zoom = z.toFixed(3);
    });
    const end = e => { if (active) { active = false; try { handle.releasePointerCapture(e.pointerId); } catch (x) {} } };
    handle.addEventListener('pointerup', end);
    handle.addEventListener('pointercancel', end);
    // ดับเบิลคลิก/แตะสองครั้ง = รีเซ็ตขนาด
    handle.addEventListener('dblclick', () => { panel.style.zoom = '1'; });
  }

  function handleTool(tool) {
    if (tool === 'mode') toggleMode();
    else if (tool === 'notes') toggleNotes();
    else if (tool === 'overview') toggleOverview();
    else if (tool === 'motion') toggleMotion();
    else if (tool === 'full') toggleFullscreen();
    else if (tool === 'help') showHelp();
  }

  function syncToolButtons() {
    document.querySelectorAll('.ctl').forEach(p => {
      const set = (tool, on, lbl) => {
        const b = p.querySelector(`[data-tool="${tool}"]`);
        if (!b) return;
        b.classList.toggle('on', on);
        if (lbl) b.querySelector('.lbl').textContent = lbl;
      };
      set('mode', state.mode === 'scroll', state.mode === 'slide' ? 'โหมดสไลด์' : 'โหมดเลื่อน');
      set('notes', state.notesOpen, 'โน้ตผู้พูด');
      set('motion', !state.motion, state.motion ? 'แอนิเมชัน' : 'ลดภาพ');
      set('overview', state.overviewOpen, 'ภาพรวม');
    });
  }

  // ── draggable (Pointer Events รองรับจอสัมผัส) ─────────────────────────────
  function makeDraggable(panel, handle) {
    let sx = 0, sy = 0, ox = 0, oy = 0, dragging = false;
    handle.addEventListener('pointerdown', e => {
      if (e.target.closest('.ctl__min')) return;
      dragging = true;
      handle.setPointerCapture(e.pointerId);
      const r = panel.getBoundingClientRect();
      // เปลี่ยนมาใช้ left/top เด็ดขาด (ยกเลิก right/bottom)
      panel.style.left = r.left + 'px';
      panel.style.top = r.top + 'px';
      panel.style.right = 'auto';
      panel.style.bottom = 'auto';
      panel.style.transform = 'none';
      sx = e.clientX; sy = e.clientY; ox = r.left; oy = r.top;
      panel.style.transition = 'none';
    });
    handle.addEventListener('pointermove', e => {
      if (!dragging) return;
      const nx = ox + (e.clientX - sx);
      const ny = oy + (e.clientY - sy);
      const maxX = window.innerWidth - panel.offsetWidth - 4;
      const maxY = window.innerHeight - 40;
      panel.style.left = Math.max(4, Math.min(maxX, nx)) + 'px';
      panel.style.top = Math.max(4, Math.min(maxY, ny)) + 'px';
    });
    const end = e => { if (dragging) { dragging = false; try { handle.releasePointerCapture(e.pointerId); } catch (x) {} } };
    handle.addEventListener('pointerup', end);
    handle.addEventListener('pointercancel', end);
  }

  // ── speaker notes ────────────────────────────────────────────────────────
  function buildNotes() {
    const n = el('div'); n.id = 'notes';
    n.innerHTML = `
      <div class="nhead">
        <span class="ttl">📝 สคริปต์ผู้พูด</span>
        <span class="who"></span>
        <button class="nclose" aria-label="ปิดโน้ต">✕</button>
      </div>
      <div class="nbody"></div>`;
    document.body.appendChild(n);
    n.querySelector('.nclose').addEventListener('click', () => toggleNotes(false));
  }
  function fillNotes() {
    const s = DATA.slides[state.current];
    const n = $('#notes');
    const who = (s.speakers || []).map(x => x.name).join(', ');
    n.querySelector('.who').textContent = `สไลด์ ${state.current + 1} — ${who || '—'}`;
    const body = s.notes ? s.notes.split('\n').filter(Boolean).map(p => `<p>${p}</p>`).join('') :
      '<p class="muted">— ไม่มีสคริปต์สำหรับสไลด์นี้ —</p>';
    n.querySelector('.nbody').innerHTML = body;
  }
  function toggleNotes(force) {
    state.notesOpen = force == null ? !state.notesOpen : force;
    $('#notes').classList.toggle('show', state.notesOpen);
    if (state.notesOpen) fillNotes();
    syncToolButtons();
  }

  // ── overview grid ────────────────────────────────────────────────────────
  function buildOverview() {
    const o = el('div'); o.id = 'overview';
    const cells = DATA.slides.map((s, i) => {
      const sp = (s.speakers || []).map(x => x.name).join(', ');
      return `<button class="ov-cell" data-goto="${i}" data-theme="${s.theme || 'overview'}">
          <span class="ov-no">สไลด์ ${i + 1}</span>
          <span class="ov-ttl">${s.ovTitle || s.kicker || ''}</span>
          <span class="ov-sp">${sp}</span>
        </button>`;
    }).join('');
    o.innerHTML = `<button class="btn ov-close">✕ ปิด</button>
      <h2>ภาพรวมสไลด์ทั้งหมด (${DATA.slides.length})</h2>
      <div class="ov-grid">${cells}</div>`;
    document.body.appendChild(o);
    o.querySelector('.ov-close').addEventListener('click', () => toggleOverview(false));
    o.querySelectorAll('.ov-cell').forEach(c => {
      c.addEventListener('click', () => { toggleOverview(false); goto(+c.dataset.goto); });
    });
  }
  function toggleOverview(force) {
    state.overviewOpen = force == null ? !state.overviewOpen : force;
    $('#overview').classList.toggle('show', state.overviewOpen);
    syncToolButtons();
  }

  // ── toast / help ─────────────────────────────────────────────────────────
  function buildToast() { document.body.appendChild(Object.assign(el('div'), { id: 'toast' })); }
  let toastTimer = null;
  function toast(msg) {
    const t = $('#toast'); t.textContent = msg; t.classList.add('show');
    clearTimeout(toastTimer); toastTimer = setTimeout(() => t.classList.remove('show'), 1700);
  }
  function showHelp() {
    toast('คีย์ลัด: ← → เลื่อน · N โน้ต · S โหมด · M แอนิเมชัน · O ภาพรวม · F เต็มจอ');
  }

  // ── keyboard ─────────────────────────────────────────────────────────────
  let numBuf = '', numTimer = null;
  function onKey(e) {
    if (e.target.matches('input, textarea, select')) return;
    const k = e.key;
    if (k === 'ArrowRight' || k === 'PageDown' || k === ' ') { e.preventDefault(); next(); }
    else if (k === 'ArrowLeft' || k === 'PageUp') { e.preventDefault(); prev(); }
    else if (k === 'ArrowDown' && state.mode === 'slide') { e.preventDefault(); next(); }
    else if (k === 'ArrowUp' && state.mode === 'slide') { e.preventDefault(); prev(); }
    else if (k === 'Home') { e.preventDefault(); goto(0); }
    else if (k === 'End') { e.preventDefault(); goto(state.total - 1); }
    else if (k === 'n' || k === 'N' || k === 'ๆ') toggleNotes();
    else if (k === 's' || k === 'S') toggleMode();
    else if (k === 'm' || k === 'M') toggleMotion();
    else if (k === 'o' || k === 'O') toggleOverview();
    else if (k === 'f' || k === 'F') toggleFullscreen();
    else if (k === 'Escape') { toggleOverview(false); toggleNotes(false); }
    else if (k === '?') showHelp();
    else if (/^[0-9]$/.test(k)) {
      numBuf += k; clearTimeout(numTimer);
      numTimer = setTimeout(() => {
        const n = parseInt(numBuf, 10);
        if (n >= 1 && n <= state.total) goto(n - 1);
        numBuf = '';
      }, 450);
    }
  }

  // ── touch swipe (โหมดสไลด์) ──────────────────────────────────────────────
  function initSwipe() {
    let x0 = null, y0 = null;
    deckEl.addEventListener('pointerdown', e => {
      if (state.mode !== 'slide') return;
      if (e.target.closest('.ctl, .quiz, .anim-controls, .organ-list, input, button, .hotspot, .diagram')) return;
      if (e.pointerType === 'mouse') return;
      x0 = e.clientX; y0 = e.clientY;
    });
    deckEl.addEventListener('pointerup', e => {
      if (x0 == null) return;
      const dx = e.clientX - x0, dy = e.clientY - y0;
      if (Math.abs(dx) > 70 && Math.abs(dx) > Math.abs(dy) * 1.4) { dx < 0 ? next() : prev(); }
      x0 = y0 = null;
    });
  }

  // ── boot ─────────────────────────────────────────────────────────────────
  function boot() {
    const prefs = loadPrefs();
    if (prefs.mode) state.mode = prefs.mode;
    if (prefs.motion === false) state.motion = false;

    const bf = document.getElementById('boot-fallback');
    if (bf) bf.remove();

    render();
    document.body.classList.toggle('reduce-motion', !state.motion);
    applyMode();
    initSwipe();
    window.addEventListener('keydown', onKey);
    window.addEventListener('resize', () => { if (state.mode === 'slide') refit(); });
    window.addEventListener('hashchange', routeHash);
    routeHash();
    syncToolButtons();
  }

  function routeHash() {
    const m = (location.hash || '').match(/#(?:slide-)?(\d+)/);
    if (m) { const i = parseInt(m[1], 10) - 1; if (i >= 0 && i < state.total) goto(i); }
  }

  return { boot, next, prev, goto, toggleMode, toggleMotion, refit, get state() { return state; } };
})();

;
/* ===== js/main.js ===== */
/* ============================================================================
   main.js — bootstrap
   ============================================================================ */
'use strict';
(function () {
  function start() {
    try {
      Engine.boot();
    } catch (e) {
      console.error(e);
      var f = document.getElementById('boot-fallback');
      if (f) f.textContent = 'เกิดข้อผิดพลาดในการโหลด: ' + (e && e.message ? e.message : e);
    }
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', start);
  } else {
    start();
  }
})();

</script>
